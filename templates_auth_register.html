{% extends "base.html" %}

{% block title %}Register - Surgery Day Builder{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1>Create Account</h1>
        <p class="auth-subtitle">Join our community</p>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required class="form-input">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required class="form-input">
            </div>
            
            <div class="form-group">
                <label for="name">Full Name (optional)</label>
                <input type="text" id="name" name="name" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="form-input">
            </div>
            
            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" required class="form-input">
            </div>
            
            <button type="submit" class="button button-primary full-width">Register</button>
        </form>
        
        <p class="auth-link">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}
